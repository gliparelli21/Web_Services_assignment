services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api-server
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
    networks:
      - pipeline-network

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - pipeline-network

networks:
  pipeline-network:
    driver: bridge
